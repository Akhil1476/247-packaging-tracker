<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>247 Packaging Corp — Admin</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

  <header class="app-header">
    <div class="brand">
      <span class="company-name">247 Packaging Corp</span>
      <h1>Admin Dashboard</h1>
    </div>
    <nav>
      <a href="/" class="btn-nav">+ New Load</a>
    </nav>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Total Loads</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-today">—</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-flavors">—</div>
      <div class="stat-label">Flavor Lines</div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search by customer, preparer, or flavor…" />
    <button class="btn btn-primary" onclick="loadData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Refresh
    </button>
    <a href="/api/export/excel" class="btn btn-excel" download>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      Export Excel
    </a>
  </div>

  <div id="submissions-list"></div>

  <div id="toast" class="toast" role="status"></div>

  <script src="/js/admin.js"></script>
</body>
</html>
